name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: tofu fmt + validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add each stack directory here as you create it.
        stack:
          - envs/dev/example
    steps:
      - uses: actions/checkout@v5
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2 # node24 runtime
        with:
          tofu_version_file: .opentofu-version # version SSOT
          tofu_wrapper: false
      - name: tofu fmt -check
        run: tofu fmt -check -recursive
      - name: tofu validate (${{ matrix.stack }})
        working-directory: ${{ matrix.stack }}
        # -backend=false: validate config without touching the real S3 backend.
        run: |
          tofu init -input=false -backend=false
          tofu validate
